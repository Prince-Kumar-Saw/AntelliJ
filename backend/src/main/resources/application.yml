spring:
  application:
    name: interviewace-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/interviewace_db
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your_email@gmail.com}
    password: ${MAIL_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast512BitsLongForHS512AlgorithmInterviewAceAI2024}
  access-token-expiry: 86400000    # 24 hours in milliseconds
  refresh-token-expiry: 604800000  # 7 days in milliseconds

gemini:
  api:
    key: ${GEMINI_API_KEY:your_gemini_api_key_here}
    base-url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-1.5-flash

storage:
  upload-dir: ${UPLOAD_DIR:./uploads/resumes}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

logging:
  level:
    com.interviewace: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
